<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stretch Interaction Camera</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stage" aria-label="Interactive camera stretch effect">
      <video id="camera" playsinline muted autoplay></video>
      <canvas id="output"></canvas>

      <section class="hud" aria-live="polite">
        <div class="status">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">准备摄像头</span>
        </div>
        <button id="fullscreenButton" type="button" title="全屏">
          <span>全屏</span>
        </button>
      </section>

      <section id="permissionPanel" class="permission-panel">
        <h1>Stretch Camera</h1>
        <p>打开摄像头后，画面会占满屏幕，并为识别到的人物生成实时拉伸网格。</p>
        <button id="startButton" type="button">开启摄像头</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
